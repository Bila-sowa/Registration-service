<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to the account</title>
    <link rel="preloader" href="./css/style.css">
    <link rel="preloader" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/js/services/login.js" type="module" defer></script>
    <script src="./js/utils/formDefender.js" defer></script>
</head>
<body>
    <form>
        <h1>Login to the account</h1>
        <div class="form-inputs">
            <input id="login-input" placeholder="Enter you email or number" autocomplete="off" maxlength="32">
            <input id="password-input" placeholder="Enter you password" autocomplete="off" maxlength="64">
            <p id="result"></p>
        </div>
        <button id="login-button">Login</button>
        <div class="other-tools">
            <p>Don't have an account?<a id="create-account-link" href="./creation.html" target="_blank"> Create an account</a></p>
            <p>Forgot your password?<a id="recovery-methods-link" href="./recovery.html">Recovery methods</a></p>
        </div>
    </form>
    
</body>
</html>
