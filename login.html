<!DOCTYPE html>

<head>

    <link rel="preloader" href="./css/style.css">

<body>
    <form>
        <h1>Login to the account</h1>
        <div class="form-inputs">
            <input id="email-input" placeholder="Enter you email or number" autocomplete="off">

        <button id="submit-button">Submit</button>
        <div class="other-tools">
            <p>Don't have an account?<a href="./creation.html" target="_blank"> Create an account</a></p>

    </form>
