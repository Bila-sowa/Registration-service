<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Methods</title>
    <link rel="preloader" href="./css/style.css">
    <link rel="preloader" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="./js/services/recovery.js"></script>
    <script src="./js/utils/formDefender.js" defer></script>
</head>
<body>
    <form>
        <div class="form-inputs">
            <h1>Recovery Methods</h1>
            <p>Please select at least one recovery method <b>(choosing 2 methods will give a better result).</b></p><br>
            <p>Please recall the date when you registered your account.</p>
            <input id="email-input" placeholder="DD.MM.YYYY" type="email" autocomplete="off" maxlength="32">
            <p>Please recall your last password, at least partially.</p>
            <input id="phone-number-input" placeholder="Enter you phone number" autocomplete="off" maxlength="13"><br>
            <button id="submit-button">Submit an application.</button>
        </div>
    </form>
    
</body>
</html>
